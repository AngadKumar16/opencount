<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: deep forest to rich emerald -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#052e16"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>

    <!-- Main emerald glow gradient for the sigma -->
    <linearGradient id="sigma" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#6ee7b7"/>
      <stop offset="60%"  stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Subtle inner light -->
    <radialGradient id="inner-glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%"   stop-color="rgba(110,231,183,0.15)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>

    <!-- Drop shadow filter -->
    <filter id="sigma-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#059669" flood-opacity="0.6"/>
    </filter>

    <!-- Outer glow on background shape -->
    <filter id="bg-glow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Clip to rounded square -->
    <clipPath id="clip">
      <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>

  <!-- Inner radial light -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#inner-glow)"/>

  <!-- Subtle grid lines (ledger feel) -->
  <g opacity="0.06" stroke="#34d399" stroke-width="1.5">
    <line x1="160" y1="420" x2="864" y2="420"/>
    <line x1="160" y1="512" x2="864" y2="512"/>
    <line x1="160" y1="604" x2="864" y2="604"/>
  </g>

  <!-- The sigma (∑) symbol — custom geometric path, not a text node -->
  <!--
    Stylized open-faced sigma: two diagonals + top/bottom arms
    Designed to read as both "sum" and the opencount "OC" at a glance.
  -->
  <g filter="url(#sigma-shadow)">
    <!-- Top horizontal arm -->
    <rect x="280" y="248" width="464" height="64" rx="32" fill="url(#sigma)"/>
    <!-- Top-right diagonal line down-left -->
    <polygon
      points="744,248 744,312 460,512 280,512 280,448 540,448"
      fill="url(#sigma)"
    />
    <!-- Bottom-right diagonal line down-right -->
    <polygon
      points="280,512 460,512 744,712 744,776 280,776 280,712 540,712"
      fill="url(#sigma)"
    />
    <!-- Bottom horizontal arm -->
    <rect x="280" y="712" width="464" height="64" rx="32" fill="url(#sigma)"/>

    <!-- Middle vertical bar (unique opencount mark — the "ledger bar") -->
    <rect x="252" y="248" width="60" height="528" rx="30" fill="url(#sigma)"/>
  </g>

  <!-- Top-right accent dot (sparkle) -->
  <circle cx="800" cy="224" r="36" fill="#34d399" opacity="0.9"/>
  <circle cx="800" cy="224" r="20" fill="#6ee7b7" opacity="0.8"/>
</svg>
